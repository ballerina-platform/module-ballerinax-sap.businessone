name: PR Build

# Mirrors ballerina-library/.github/workflows/s4hana-pr-template.yml. Inlined
# (instead of `uses:`) because the shared template builds with plugin-gradle
# 2.x docker mode and a sanitation subproject, which this repo does not use;
# this repo builds with the locally installed Ballerina (plugin-gradle 3.x).

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

on: pull_request

jobs:
  generate-matrix:
    name: Generate Matrix
    runs-on: ubuntu-22.04
    outputs:
      directories: ${{ steps.set-matrix.outputs.directories }}
    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v3
      - name: Set matrix for build
        id: set-matrix
        run: |
          folders=()
          cd ballerina
          for dir in $(find . -type d -maxdepth 1 -mindepth 1 | cut -c3-); do
            # Skip non-package directories (e.g. the shared test resources/cert folder).
            [ -f "$dir/Ballerina.toml" ] || continue
            folders+=("$dir");
          done
          echo "directories=$(jq -nc --args '$ARGS.positional' ${folders[@]})" >> $GITHUB_OUTPUT

  build-connectors:
    name: Build Connectors
    runs-on: ubuntu-22.04
    needs: generate-matrix
    strategy:
      fail-fast: false
      matrix:
        directory: ${{ fromJSON(needs.generate-matrix.outputs.directories) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Get Ballerina Version
        run: |
          BAL_VERSION=$(grep -w 'ballerinaLangVersion' gradle.properties | cut -d= -f2 | rev | cut --complement -d- -f1 | rev)
          if [ -z "$BAL_VERSION" ]; then
            BAL_VERSION="latest"
          fi
          echo "BAL_VERSION=$BAL_VERSION" >> $GITHUB_ENV

      - name: Set Up Ballerina
        uses: ballerina-platform/setup-ballerina@v1.1.0
        with:
          version: ${{ env.BAL_VERSION }}

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: 21.0.3

      - name: Build the Package
        env:
          packageUser: ${{ github.actor }}
          packagePAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Warm the Ballerina central cache with an online build first; the
          # test task runs `bal test --offline` and needs the locked versions
          # to be present in the cache on a fresh runner.
          ./gradlew :businessone-ballerina:${{ matrix.directory }}:build -x test
          ./gradlew :businessone-ballerina:${{ matrix.directory }}:test

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.directory }}
          path: ballerina/**/coverage-report.xml

  upload-codecov:
    name: Upload Codecov
    runs-on: ubuntu-22.04
    needs: build-connectors
    steps:
      - name: Download coverage reports
        uses: actions/download-artifact@v4

      - name: Generate CodeCov Report
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ballerina-platform/${{ github.event.repository.name }}

  build-examples:
    name: Build Examples
    runs-on: ubuntu-22.04
    needs: build-connectors
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Get Ballerina Version
        run: |
          BAL_VERSION=$(grep -w 'ballerinaLangVersion' gradle.properties | cut -d= -f2 | rev | cut --complement -d- -f1 | rev)
          if [ -z "$BAL_VERSION" ]; then
            BAL_VERSION="latest"
          fi
          echo "BAL_VERSION=$BAL_VERSION" >> $GITHUB_ENV

      - name: Set Up Ballerina
        uses: ballerina-platform/setup-ballerina@v1.1.0
        with:
          version: ${{ env.BAL_VERSION }}

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: 21.0.3

      - name: Build the Examples
        env:
          packageUser: ${{ github.actor }}
          packagePAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Warm the Ballerina central cache with an online build first (see above).
          ./gradlew :businessone-ballerina:build -x test
          ./gradlew :businessone-examples:build
