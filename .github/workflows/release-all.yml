name: Publish Release (All Packages)

# Releases every package in dependency order using the standard
# ballerina-library release template: the sap.businessone wrapper first, then
# each module connector sequentially (max-parallel: 1, because every release
# pushes a version-bump commit and a release branch).
#
# fail-fast is disabled so one failing connector does not block the rest;
# re-run the single-package "Publish Release" workflow for any that failed.
on:
  workflow_dispatch:
    inputs:
      release-wrapper:
        type: boolean
        description: Release the sap.businessone wrapper first
        required: true
        default: true

jobs:
  release-wrapper:
    name: Release Wrapper (sap.businessone)
    if: ${{ github.repository_owner == 'ballerina-platform' && inputs.release-wrapper }}
    uses: ballerina-platform/ballerina-library/.github/workflows/s4hana-release-template.yml@main
    secrets: inherit
    with:
      hana-connector-group: businessone
      hana-connector-name: businessone

  release-connectors:
    name: Release Connectors
    needs: release-wrapper
    if: ${{ always() && github.repository_owner == 'ballerina-platform' && needs.release-wrapper.result != 'failure' && needs.release-wrapper.result != 'cancelled' }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package:
          - administration
          - financials
          - fixedassets
          - businesspartners
          - crm
          - sales
          - purchasing
          - banking
          - inventory
          - production
          - projects
          - service
          - humanresources
          - localization
    uses: ballerina-platform/ballerina-library/.github/workflows/s4hana-release-template.yml@main
    secrets: inherit
    with:
      hana-connector-group: businessone
      hana-connector-name: ${{ matrix.package }}
