name: Publish Single Package to the Ballerina Dev\Stage Central

# Mirrors ballerina-library/.github/workflows/s4hana-dev-stage-central-single-publish-template.yml.
# Inlined (instead of `uses:`) because the shared template does not set up a
# local Ballerina distribution, which this repo's build (plugin-gradle 3.x)
# requires.

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Select Environment
        required: true
        options:
          - DEV CENTRAL
          - STAGE CENTRAL
      package:
        type: choice
        description: Select Package
        required: true
        options:
          - businessone
          - administration
          - financials
          - fixedassets
          - businesspartners
          - crm
          - sales
          - purchasing
          - banking
          - inventory
          - production
          - projects
          - service
          - humanresources
          - localization

jobs:
  publish:
    name: Publish to Dev\Stage Central
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'ballerina-platform' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Get Ballerina Version
        run: |
          BAL_VERSION=$(grep -w 'ballerinaLangVersion' gradle.properties | cut -d= -f2 | rev | cut --complement -d- -f1 | rev)
          if [ -z "$BAL_VERSION" ]; then
            BAL_VERSION="latest"
          fi
          echo "BAL_VERSION=$BAL_VERSION" >> $GITHUB_ENV

      - name: Set Up Ballerina
        uses: ballerina-platform/setup-ballerina@v1.1.0
        with:
          version: ${{ env.BAL_VERSION }}

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: 21.0.3

      - name: Warm Ballerina Central Cache
        env:
          packageUser: ${{ github.actor }}
          packagePAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The test task runs `bal test --offline` and needs the locked
          # versions to be present in the cache on a fresh runner.
          ./gradlew :businessone-ballerina:${{ inputs.package }}:build -x test

      - name: Ballerina Central Dev Push
        if: ${{ inputs.environment == 'DEV CENTRAL' }}
        env:
          BALLERINA_DEV_CENTRAL: true
          BALLERINA_STAGE_CENTRAL: false
          BALLERINA_CENTRAL_ACCESS_TOKEN: ${{ secrets.BALLERINA_CENTRAL_DEV_ACCESS_TOKEN }}
          packageUser: ${{ secrets.BALLERINA_BOT_USERNAME }}
          packagePAT: ${{ secrets.BALLERINA_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.BALLERINA_BOT_TOKEN }}
        run: |
          ./gradlew clean :businessone-ballerina:${{ inputs.package }}:build -PpublishToCentral=true

      - name: Ballerina Central Stage Push
        if: ${{ inputs.environment == 'STAGE CENTRAL' }}
        env:
          BALLERINA_DEV_CENTRAL: false
          BALLERINA_STAGE_CENTRAL: true
          BALLERINA_CENTRAL_ACCESS_TOKEN: ${{ secrets.BALLERINA_CENTRAL_STAGE_ACCESS_TOKEN }}
          packageUser: ${{ secrets.BALLERINA_BOT_USERNAME }}
          packagePAT: ${{ secrets.BALLERINA_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.BALLERINA_BOT_TOKEN }}
        run: |
          ./gradlew clean :businessone-ballerina:${{ inputs.package }}:build -PpublishToCentral=true
