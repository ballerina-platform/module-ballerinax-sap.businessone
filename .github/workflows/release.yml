name: Publish Release

# Releases one package using the standard ballerina-library release template.
# The wrapper (businessone) must be released to Ballerina Central before the
# first release of any connector that depends on it; use
# "Publish Release (All Packages)" for an ordered full release.
on:
  workflow_dispatch:
    inputs:
      package:
        type: choice
        description: Select Package
        required: true
        options:
          - businessone
          - administration
          - financials
          - fixedassets
          - businesspartners
          - crm
          - sales
          - purchasing
          - banking
          - inventory
          - production
          - projects
          - service
          - humanresources
          - localization

jobs:
  call_workflow:
    name: Run Release Workflow
    if: ${{ github.repository_owner == 'ballerina-platform' }}
    uses: ballerina-platform/ballerina-library/.github/workflows/s4hana-release-template.yml@main
    secrets: inherit
    with:
      hana-connector-group: businessone
      hana-connector-name: ${{ inputs.package }}
